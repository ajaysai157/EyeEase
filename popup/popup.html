<!DOCTYPE html>
<html>

<head>
    <title>EyeEase</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>

    <div class="container">
        <h1>EyeEase</h1>

        <label>
            <input type="checkbox" id="toggle">
            Enable Protection
        </label>

        <div class="slider-box">
            <p>Comfort Intensity</p>
            <input type="range" min="0.75" max="1" step="0.01" id="intensity">
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
