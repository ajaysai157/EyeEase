<!DOCTYPE html>
<html>

<head>
    <title>EyeEase</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>EyeEase</h1>
            <p>Adaptive Visual Comfort</p>
        </div>

        <div class="toggle-card">

            <span>Protection</span>

            <label class="switch">
                <input type="checkbox" id="toggle">
                <span class="slider"></span>
            </label>

        </div>

        <div class="card">

            <div class="row">

                <span>Comfort Level</span>

                <span id="intensity-value">
                    50%
                </span>

            </div>

            <input type="range" min="0" max="100" value="50" id="intensity">

        </div>

        <div class="mode-card">

            <div class="mode-title">
                Current Mode
            </div>

            <div id="current-mode">
                Adaptive
            </div>

        </div>

    </div>

    <script src="popup.js"></script>

</body>

</html>
